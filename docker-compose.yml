services:
  redis:
    image: redis:7.4-alpine
    container_name: skysh-kulab-redis
    ports:
      - "6379:6379"
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --maxmemory
      - 20mb
      - --maxmemory-policy
      - volatile-ttl
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  redis-data:
